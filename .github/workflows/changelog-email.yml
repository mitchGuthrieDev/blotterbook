name: Changelog email

# F44 — when a NEW curated changelog entry lands on main (docs/changelog-email-a141.md), tell the
# deployed /api/notify-changelog endpoint to broadcast the top release to confirmed subscribers.
#
# WHY a dedicated workflow (not version-bump.yml): the curated changelog entry lands in its own
# hand-authored commit (per CLAUDE.md), separate from the [skip ci] release-bump commit — so this is
# paths-filtered on static/data/changelog.json and only that file's changes trigger a send. The send
# itself is idempotent server-side (the changelog_sends ledger), so a duplicate/re-run never
# double-mails a version.
#
# CONFIG (owner-gated, A315 — REQUIRED before this job can send):
#   Repo secrets (Settings → Secrets and variables → Actions):
#     - CHANGELOG_NOTIFY_URL     the origin this job POSTs to. MUST be the canonical
#                                `https://<project>.pages.dev` origin, NOT https://blotterbook.com.
#                                Find the exact pages.dev hostname on the Pages project's dashboard
#                                (Custom domains tab lists it alongside blotterbook.com).
#     - CHANGELOG_NOTIFY_SECRET  matches the Pages env var of the same name (below).
#   When either secret is unset the job no-ops cleanly, so forks / unconfigured repos never fail.
#
#   Cloudflare Pages env vars (Pages project → Settings → Environment variables, Production):
#     - CHANGELOG_NOTIFY_SECRET  same value as the repo secret above (constant-time compared, S22).
#     - PUBLIC_ORIGIN            `https://blotterbook.com`. Required so /api/notify-changelog builds
#                                user-facing links (the unsubscribe URL) off the branded domain even
#                                though this job invokes it at the pages.dev origin — see
#                                functions/api/notify-changelog.ts. Omitted → those links fall back to
#                                whatever origin the job hit, i.e. the pages.dev host would leak into a
#                                subscriber's inbox.
#
# WHY pages.dev, not blotterbook.com (A315 decision): blotterbook.com sits behind Cloudflare, whose
# Bot Fight Mode / Managed Challenge on that custom-domain zone answers this runner's request with a
# "Just a moment…" interstitial (HTTP 403) instead of reaching the Function — a JS challenge curl can't
# solve, and the free plan can't scope a WAF skip rule around plain Bot Fight Mode (that needs the paid
# Super Bot Fight Mode). The bare `<project>.pages.dev` hostname is Cloudflare's OWN zone (not the
# customer's), so Bot Fight Mode / Security Level on the custom domain don't apply there — the runner
# reaches the Function directly, no bypass needed. Compute/data guardrails are unaffected: this job only
# ever sends changelog TEXT (A141), never trade data, over either origin.

on:
  push:
    branches: [main]
    paths:
      - static/data/changelog.json

permissions:
  contents: read

# Don't overlap sends if two changelog commits land close together.
concurrency:
  group: changelog-email-main
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    # Belt-and-suspenders: never fire on our own release-bump commit (it doesn't touch changelog.json,
    # but the paths filter + this guard both hold).
    if: ${{ !startsWith(github.event.head_commit.message, 'chore(release):') }}
    steps:
      - uses: actions/checkout@v5

      - name: Broadcast the latest changelog release
        env:
          NOTIFY_URL: ${{ secrets.CHANGELOG_NOTIFY_URL }}
          NOTIFY_SECRET: ${{ secrets.CHANGELOG_NOTIFY_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${NOTIFY_URL}" ] || [ -z "${NOTIFY_SECRET}" ]; then
            echo "CHANGELOG_NOTIFY_URL / CHANGELOG_NOTIFY_SECRET not set — skipping the changelog broadcast."
            exit 0
          fi

          # The version we just committed — the send should broadcast exactly this one.
          EXPECTED="$(node -e "process.stdout.write((require('./static/data/changelog.json').releases[0]||{}).version||'')")"
          echo "Committed top release: ${EXPECTED:-<none>}"
          if [ -z "$EXPECTED" ]; then
            echo "No top release version in changelog.json — nothing to broadcast."
            exit 0
          fi

          BASE="${NOTIFY_URL%/}"
          # A browser-ish UA as defense-in-depth; the real fix is routing at the pages.dev origin (see
          # header CONFIG) — that hostname isn't governed by the custom domain's Bot Fight Mode at all.
          UA="Mozilla/5.0 (compatible; BlotterbookChangelogBot/1.0; +https://blotterbook.com)"

          # One authenticated path does both jobs: it waits out the Cloudflare Pages deploy (the Function
          # answers 425 while it still serves the previous release) and performs the idempotent send. No
          # separate static-file poll — routing at the pages.dev origin (see header CONFIG) is what lets
          # this reach the Function at all; the deploy-freshness gate just avoids a stale-version send.
          for attempt in $(seq 1 20); do
            : > /tmp/notify-body.txt
            HTTP_CODE="$(curl -sS -o /tmp/notify-body.txt -w '%{http_code}' \
              -X POST "${BASE}/api/notify-changelog?version=${EXPECTED}" \
              -A "$UA" \
              -H "Accept: application/json" \
              -H "x-changelog-secret: ${NOTIFY_SECRET}")" || HTTP_CODE=000

            # A Cloudflare challenge means the request never reached our Function — retrying won't help.
            if grep -qiE "Just a moment|challenge-platform|__cf_chl|Enable JavaScript and cookies" /tmp/notify-body.txt; then
              echo "::error::Cloudflare served a bot challenge (HTTP ${HTTP_CODE}) — the request never reached /api/notify-changelog."
              echo "::error::CHANGELOG_NOTIFY_URL must be the bare https://<project>.pages.dev origin, not blotterbook.com — see"
              echo "::error::this workflow's header CONFIG comment for the exact secrets/env vars required."
              echo "----- response body (truncated) -----"; head -c 800 /tmp/notify-body.txt; echo; echo "-------------------------------------"
              exit 1
            fi

            case "$HTTP_CODE" in
              2??)
                echo "Sent (HTTP ${HTTP_CODE}):"; cat /tmp/notify-body.txt; echo
                # A TOTAL failure can no longer arrive as 2xx — the Function 502s without ledgering
                # (A318), which the 5?? case below retries. A 2xx with ok:false / failed>0 is a
                # PARTIAL send: the version is already ledgered server-side (a re-run would only
                # answer deduped:true, never re-deliver the failed subset), so warn loudly rather
                # than fail the job — retrying can't fix it.
                PARSE='const j=JSON.parse(require("fs").readFileSync("/tmp/notify-body.txt","utf8"));'
                BODY_OK="$(node -e "${PARSE} process.stdout.write(String(j.ok))" 2>/dev/null || echo unknown)"
                BODY_SENT="$(node -e "${PARSE} process.stdout.write(String(j.sent ?? 0))" 2>/dev/null || echo 0)"
                BODY_FAILED="$(node -e "${PARSE} process.stdout.write(String(j.failed ?? 0))" 2>/dev/null || echo 0)"
                if [ "$BODY_OK" != "true" ] || [ "$BODY_FAILED" != "0" ]; then
                  echo "::warning::notify-changelog reported a PARTIAL send (ok=${BODY_OK}, sent=${BODY_SENT}, failed=${BODY_FAILED}) — the version is ledgered, so the failed recipients will NOT be retried automatically."
                fi
                exit 0
                ;;
              425)
                echo "Deploy not live yet (attempt ${attempt}) — Pages still serving the previous release. Waiting…"
                ;;
              401)
                echo "::error::notify-changelog rejected the secret (401) — CHANGELOG_NOTIFY_SECRET must match the Pages env var."
                cat /tmp/notify-body.txt; echo
                exit 1
                ;;
              # 5xx includes the A318 total-send-failure 502 (nothing delivered, nothing ledgered —
              # a retry re-attempts the whole send); 429 is the fail-open notify-changelog limiter
              # (A321). Both are transient; the bounded loop exits 1 below if they never clear.
              5??|429|000)
                echo "Transient failure (HTTP ${HTTP_CODE}, attempt ${attempt}) — retrying…"
                cat /tmp/notify-body.txt; echo
                ;;
              *)
                echo "::error::notify-changelog returned ${HTTP_CODE}"
                cat /tmp/notify-body.txt; echo
                exit 1
                ;;
            esac
            sleep 30
          done

          echo "::error::Timed out after 20 attempts waiting for the deploy to go live / the send to succeed."
          exit 1
